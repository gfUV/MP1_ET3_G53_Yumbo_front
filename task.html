<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tareas</title>
  <link rel="stylesheet" href="task.css">
</head>
<body>
  <main class="container">
    <section class="form-container">
      <!-- Header -->
      <header class="header">
        <h2 class="logo">Tareas</h2>
        <!-- Botón hamburguesa -->
        <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menú">☰</button>
        <!-- Menú oculto -->
        <nav class="menu" id="menu">
          <ul>
            <li><button id="add-task">➕ Agregar tarea</button></li>
            <li><button id="profile">👤 Mi perfil</button></li>
            <li><button id="about">ℹ️ Sobre nosotros</button></li>
            <li><button id="logout">🚪 Cerrar sesión</button></li>
          </ul>
        </nav>
      </header>

      <!-- Tablero de tareas -->
      <div id="task-list" class="task-board">
        <!-- Columna Pendientes -->
        <div class="task-column" id="pending-tasks">
          <h3>Pendientes</h3>
        </div>

        <!-- Columna En proceso -->
        <div class="task-column" id="inprogress-tasks">
          <h3>En proceso</h3>
        </div>

        <!-- Columna Completadas -->
        <div class="task-column" id="completed-tasks">
          <h3>Completadas</h3>
        </div>
      </div>
    </section>
  </main>

  <!-- Script de lógica -->
  <script type="module" src="/task.js"></script>

  <!-- Script sobre nosotros -->
  <script type="module" src="/public/about_us.js"></script>



  <!-- Script menú hamburguesa -->
  <script>
    const menuToggle = document.getElementById("menu-toggle");
    const menu = document.getElementById("menu");

    menuToggle.addEventListener("click", () => {
      menu.classList.toggle("show");
    });
  </script>
</body>
</html>
